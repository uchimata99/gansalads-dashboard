:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:var(--text);direction:rtl;min-width:320px}

<script>
// ════════════════════════════════════════════════════════════
//  התחברות גוגל + טעינת הנתונים מהגיליון המוגבל (קריאה בלבד)
//  אין מספרים במקור הדף — הכול נטען בזמן ריצה אחרי כניסה.
//  מפתח הסשן משותף עם production.html ו-finance.html (gsGoogleToken)
//  כך שמי שכבר התחבר בעמוד אחר אינו מתבקש להתחבר שוב.
//
//  שתי לשוניות בגיליון, בפורמט של לשונית DATA:
//  בלוק טקסט-JSON מובנה מפוצל לתאים רצופים בעמודה A. קוראים את כל
//  עמודה A, משרשרים את התאים הלא-ריקים לפי הסדר ומפענחים לאובייקט.
//
//    FORECAST  — תחזית השבוע הקרוב (מתעדכן ביום חמישי בבוקר). מבנה:
//      { week:"W26", week_start:"2026-06-28", generated:"2026-06-26",
//        total_kg:Number, active_products:Number, peak_day:"שני",
//        next_holiday:"" | "פסח" | {name,date},
//        daily:{"ראשון":kg,...} | [{day,kg},...],
//        products:[ {name, kg, id?, daily?:{"ראשון":kg,...}} , ... ] }
//      שדות מצרפיים שאינם קיימים נגזרים מהמוצרים/הפילוח (לא מומצאים).
//
//    ACCURACY  — דוח ההצלחה של השבוע שעבר (מתעדכן ביום ראשון בבוקר,
//      ע"י forecast_accuracy.py). מבנה:
//      { week:"W25", forecast_total:Number, actual_total:Number,
//        wape:Number (אחוז),
//        products:[ {name, forecast, actual} , ... ],
//        always_over:[name,...], always_under:[name,...] }
//      אם הלשונית ריקה — מוצגת הודעה שהדוח יופיע ביום ראשון.
// ════════════════════════════════════════════════════════════
const FC_CLIENT_ID='535307633607-aplksnr9dmlrmop936nc1qp9m9o9e100.apps.googleusercontent.com';
const SHEET_ID='1_rJ8lLYNme8RM83ws1pFOGij0HPAVAUFefBDYl2_B5A';
const FC_SCOPE='https://www.googleapis.com/auth/spreadsheets.readonly';
const FC_TOKEN_KEY='gsGoogleToken';   // משותף עם production.html ו-finance.html

let fcTokenClient=null, fcAccessToken=null;
let FORECAST=null, ACCURACY=null, PRODDATA=null;

function gsShowErr(msg){ const e=document.getElementById('gsLockErr'); if(e) e.textContent=msg||''; }

function gsInitClient(){
  if(fcTokenClient) return fcTokenClient;
  if(!(window.google&&google.accounts&&google.accounts.oauth2)) return null;
  fcTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:FC_CLIENT_ID, scope:FC_SCOPE,
    callback:(resp)=>{
      if(resp&&resp.error){ gsShowErr('ההתחברות נכשלה — נסה שוב'); return; }
      fcAccessToken=resp.access_token;
      try{ sessionStorage.setItem(FC_TOKEN_KEY, JSON.stringify({t:fcAccessToken, exp:Date.now()+((resp.expires_in||3600)*1000)})); }catch(e){}
      gsAfterToken();
    }
  });
  return fcTokenClient;
}

function gsSignIn(){
  gsShowErr('');
  const c=gsInitClient();
  if(!c){ gsShowErr('מנגנון ההתחברות עדיין נטען — נסה שוב בעוד רגע'); return; }
  c.requestAccessToken({prompt: fcAccessToken?'':'consent'});
}

function gsAfterToken(){
  loadForecastData().then(()=>{
    document.documentElement.classList.remove('locked');
    const l=document.getElementById('gsLock'); if(l) l.style.display='none';
    startDashboard();
  }).catch(err=>{
    fcAccessToken=null;
    try{ sessionStorage.removeItem(FC_TOKEN_KEY); }catch(e){}
    gsShowErr('אין הרשאה לנתונים עם החשבון הזה. התחבר עם החשבון המורשה.');
  });
}

// משיכת עמודה A מלשונית, שרשור התאים הלא-ריקים ופענוח לאובייקט אחד.
// FORECAST חובה; ACCURACY אופציונלי (ריק → null, מוצגת הודעה).
async function fetchTabObject(tab, required){
  const range=encodeURIComponent(tab+'!A:A');
  const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+range,
    {headers:{Authorization:'Bearer '+fcAccessToken}});
  if(r.status===401||r.status===403) throw new Error('auth '+r.status);
  if(!r.ok){
    if(required) throw new Error(tab+' '+r.status);
    return null;   // לשונית שלא קיימת עדיין — לא נחשב כשגיאה
  }
  const j=await r.json();
  const cells=(j.values||[]).map(row=>(row&&row.length?row[0]:'')).filter(x=>x!==''&&x!=null);
  if(!cells.length){ if(required) throw new Error(tab+' empty'); return null; }
  return JSON.parse(cells.join(''));
}

async function loadForecastData(){
  // FORECAST ו-ACCURACY אינן חובה: אם לשונית חסרה/ריקה — מוצגת הודעת המתנה.
  // רק שגיאת הרשאה (401/403) מחזירה למסך הכניסה.
  try{ FORECAST=await fetchTabObject('FORECAST', false); }
  catch(e){ if(String(e.message).indexOf('auth')===0) throw e; FORECAST=null; }
  try{ ACCURACY=await fetchTabObject('ACCURACY', false); }
  catch(e){ if(String(e.message).indexOf('auth')===0) throw e; ACCURACY=null; }
  // נתוני הייצור ההיסטוריים (אותו גיליון, לשונית DATA כמו ב-production.html) —
  // משמשים לחישוב תחזית זמנית כל עוד לשונית FORECAST ריקה.
  try{ PRODDATA=await fetchTabObject('DATA', false); }
  catch(e){ if(String(e.message).indexOf('auth')===0) throw e; PRODDATA=null; }
}

function startDashboard(){
  const go=()=>{
    try{ if(window.Chart) Chart.defaults.font.family="'Segoe UI',Arial,sans-serif"; }catch(e){}
    // אם אין עדיין תחזית רשמית בלשונית FORECAST — מחשבים תחזית זמנית מנתוני DATA
    if(!(FORECAST && (FORECAST.products||FORECAST.daily||FORECAST.total_kg!=null))){
      const c=computeForecastFromData(PRODDATA);
      if(c) FORECAST=c;
    }
    if(FORECAST && (FORECAST.products||FORECAST.daily||FORECAST.total_kg!=null)){
      document.getElementById('fcBody').style.display='';
      document.getElementById('fcEmpty').innerHTML = FORECAST.computed
        ? '<div class="ins a" style="margin-bottom:18px">⚠️ <b>תחזית זמנית</b> — מחושבת אוטומטית מממוצע ארבעת שבועות הייצור האחרונים ('+(FORECAST.based_on||'')+'), פר מוצר ופר יום. זו הערכה בלבד; התחזית הרשמית של יום חמישי תחליף אותה אוטומטית ברגע שתיכתב לגיליון.</div>'
        : '';
      prepareForecast();
      renderHeader();
      renderForecastKpis();
      buildDailyChart();
      buildTopProductsChart();
      buildProductsTable();
    } else {
      renderForecastEmpty();
    }
    renderAccuracy();
  };
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', go, {once:true});
  else go();
}

// בטעינה: אם יש אסימון תקף בסשן — להמשיך; אחרת להציג מסך התחברות
window.addEventListener('load', ()=>{
  let tok=null; try{ tok=JSON.parse(sessionStorage.getItem(FC_TOKEN_KEY)||'null'); }catch(e){}
  if(tok&&tok.t&&tok.exp&&tok.exp>Date.now()+60000){ fcAccessToken=tok.t; gsAfterToken(); return; }
  let tries=0; const iv=setInterval(()=>{ if(gsInitClient()||++tries>40) clearInterval(iv); }, 150);
});
</script>

<script>
// ═══════════════════════════════ UTILS ═══════════════════════════════
const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי'];
const DAYS_COLORS=['#e11d48','#7c3aed','#2563eb','#16a34a','#d97706','#ca8a04'];
const fmt=n=>Math.round(n).toLocaleString('he-IL');
const fmt1=n=>Number(n).toLocaleString('he-IL',{minimumFractionDigits:1,maximumFractionDigits:1});
const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'—';
const num=x=>{ if(x===''||x==null) return 0; if(typeof x==='number') return x; const n=parseFloat(String(x).replace(/,/g,'')); return isNaN(n)?0:n; };

let charts={};
function makeChart(id,cfg){ if(charts[id]){charts[id].destroy();delete charts[id];} const ctx=document.getElementById(id); if(!ctx)return; charts[id]=new Chart(ctx,cfg); return charts[id]; }
const gridOpts={color:'rgba(0,0,0,.05)',lineWidth:1};
const tickOpts={color:'#64748b',font:{size:11}};
const ttip={backgroundColor:'rgba(15,23,42,.92)',titleColor:'#fff',bodyColor:'#cbd5e1',padding:10,cornerRadius:8};

// נתונים מעובדים לתצוגה
let PRODUCTS=[];      // [{name,id, kg,pkg, daily_kg:{}, daily_pkg:{}, std_kg,std_pkg}]
let DAILY=[];         // [{day, v}] במדד הנבחר
let TOTAL=0, PEAK_DAY='', NEXT_HOL='';
let fcMetric='kg';    // 'kg' | 'pkg'
let HAS_PKG=false, HAS_STD=false;

// עזרי מדד נבחר
function unitLbl(){ return fcMetric==='kg'?'ק"ג':'אריזות'; }
function pVal(p){ return fcMetric==='kg'?p.kg:p.pkg; }
function pDaily(p){ return fcMetric==='kg'?p.daily_kg:p.daily_pkg; }
function pStd(p){ return fcMetric==='kg'?p.std_kg:p.std_pkg; }
function stdev(arr){ const n=arr.length; if(n<2) return 0; const m=arr.reduce((a,b)=>a+b,0)/n; let s=0; arr.forEach(v=>{const x=v-m;s+=x*x;}); return Math.sqrt(s/(n-1)); }

function holName(h){ if(!h) return ''; if(typeof h==='string') return h; return h.name||''; }
function holText(h){ if(!h) return ''; if(typeof h==='string') return h; return (h.name||'')+(h.date?(' ('+h.date+')'):''); }

// נורמליזציה של daily לאובייקט {יום:ק"ג}
function normDaily(d){
  const out={}; DAYS.forEach(day=>out[day]=0);
  if(!d) return out;
  if(Array.isArray(d)){ d.forEach(x=>{ const day=x&&(x.day||x.d); if(day&&out.hasOwnProperty(day)) out[day]=num(x.kg!=null?x.kg:x.k); }); }
  else if(typeof d==='object'){ DAYS.forEach(day=>{ if(d[day]!=null) out[day]=num(d[day]); }); }
  return out;
}

// ─── תחזית זמנית מנתוני DATA (ממוצע נע של 4 השבועות האחרונים, פר מוצר ופר יום) ───
// אינה ממציאה מספרים: כל ערך הוא ממוצע של הק"ג בפועל בשבועות האחרונים.
function computeForecastFromData(d){
  if(!d || !d.PROD_DETAIL) return null;
  const PD=d.PROD_DETAIL;
  const weeks=(d.WEEKS||[]).map(w=>w.w).sort((a,b)=>a-b);
  if(!weeks.length) return null;
  const recent=weeks.slice(-Math.min(4,weeks.length));
  const denom=recent.length;
  const products=[];
  for(const name in PD){
    const wk=PD[name];
    const sumP=DAYS.map(()=>0), sumK=DAYS.map(()=>0);  // 0=אריזות, 1=ק"ג בנתוני המקור
    const wkP=[], wkK=[]; let any=false;
    recent.forEach(w=>{
      const dd=wk[w]; let tp=0, tk=0;
      if(dd){ for(const di in dd){ const i=+di; if(i>=0&&i<DAYS.length){
        const p=num(dd[di][0]), k=num(dd[di][1]); sumP[i]+=p; sumK[i]+=k; tp+=p; tk+=k; if(p||k) any=true; } } }
      wkP.push(tp); wkK.push(tk);
    });
    if(!any) continue;
    const dailyP={}, dailyK={}; let totP=0, totK=0;
    DAYS.forEach((day,i)=>{ dailyP[day]=sumP[i]/denom; dailyK[day]=sumK[i]/denom; totP+=dailyP[day]; totK+=dailyK[day]; });
    if(totK<=0 && totP<=0) continue;
    products.push({name:String(name), pkg:totP, kg:totK, daily_pkg:dailyP, daily_kg:dailyK, std_pkg:stdev(wkP), std_kg:stdev(wkK)});
  }
  if(!products.length) return null;
  products.sort((a,b)=>b.kg-a.kg);
  const dtP={}, dtK={}; DAYS.forEach(day=>{ dtP[day]=0; dtK[day]=0; });
  products.forEach(p=>DAYS.forEach(day=>{ dtP[day]+=p.daily_pkg[day]; dtK[day]+=p.daily_kg[day]; }));
  return {
    computed:true, metrics:true,
    based_on:'שבועות '+recent[0]+'–'+recent[recent.length-1],
    week:'', week_start:'', generated:'',
    total_kg:products.reduce((a,p)=>a+p.kg,0),
    total_pkg:products.reduce((a,p)=>a+p.pkg,0),
    active_products:products.length, next_holiday:'',
    daily_kg:dtK, daily_pkg:dtP, products
  };
}

function prepareForecast(){
  const f=FORECAST||{};
  HAS_PKG = !!f.metrics;        // אריזות זמינות רק כשהתחזית מחושבת מ-DATA
  HAS_STD = !!f.metrics;        // סטיית תקן זמינה רק במצב המחושב
  if(!HAS_PKG) fcMetric='kg';
  PRODUCTS=(f.products||[]).map(p=>({
    name:String(p.name!=null?p.name:p.id||'—'),
    id:p.id!=null?String(p.id):'',
    kg:num(p.kg!=null?p.kg:p.total_kg),
    pkg:num(p.pkg),
    daily_kg:normDaily(p.daily_kg||p.daily),
    daily_pkg:normDaily(p.daily_pkg),
    std_kg:num(p.std_kg),
    std_pkg:num(p.std_pkg)
  }));
  NEXT_HOL = holName(f.next_holiday);
  // הסתרת בורר היחידה אם אין נתוני אריזות
  const ctrl=document.getElementById('fcControls');
  if(ctrl) ctrl.style.display = HAS_PKG ? 'flex' : 'none';
  applyMetric();
}

// מחשב מחדש את התצוגות לפי המדד הנבחר (ק"ג/אריזות) וממיין
function applyMetric(){
  PRODUCTS.sort((a,b)=>pVal(b)-pVal(a));
  const dayObj={}; DAYS.forEach(day=>dayObj[day]=0);
  PRODUCTS.forEach(p=>{ const dd=pDaily(p); DAYS.forEach(day=>dayObj[day]+=dd[day]); });
  DAILY=DAYS.map(day=>({day, v:dayObj[day]}));
  TOTAL=PRODUCTS.reduce((a,p)=>a+pVal(p),0);
  PEAK_DAY=(DAILY.reduce((b,d)=>!b||d.v>b.v?d:b,null)||{}).day||'—';
}

// החלפת יחידת מדידה ורענון התצוגה
function setFcMetric(m){
  if(m===fcMetric) return;
  fcMetric=m;
  ['kg','pkg'].forEach(x=>{ const b=document.getElementById('mbtn-'+x); if(b) b.classList.toggle('active',x===m); });
  applyMetric();
  renderHeader(); renderForecastKpis(); buildDailyChart(); buildTopProductsChart(); buildProductsTable();
}

function renderHeader(){
  const f=FORECAST||{};
  const wk=f.week||f.week_label||'';
  const sub=[wk?('תחזית ל'+wk):'תחזית השבוע הקרוב'];
  if(f.week_start) sub.push('שבוע מתחיל '+f.week_start);
  if(f.generated) sub.push('הופק '+f.generated);
  if(f.computed) sub.push('תחזית זמנית · מבוסס על '+(f.based_on||'הנתונים האחרונים'));
  document.getElementById('hdrSub').textContent=sub.join(' · ');
  document.getElementById('hdrKpis').innerHTML=
    '<div class="hkpi"><div class="hkpi-lbl">סה"כ '+unitLbl()+' לשבוע</div><div class="hkpi-val">'+fmt(TOTAL)+'</div></div>'+
    '<div class="hkpi"><div class="hkpi-lbl">מוצרים פעילים</div><div class="hkpi-val">'+fmt(FORECAST.active_products!=null?FORECAST.active_products:PRODUCTS.length)+'</div></div>'+
    '<div class="hkpi"><div class="hkpi-lbl">יום השיא</div><div class="hkpi-val">'+PEAK_DAY+'</div></div>';
}

function kc(cls,lbl,val,sub,subCls){ return '<div class="kpi '+cls+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub '+(subCls||'')+'">'+(sub||'')+'</div></div>'; }

function renderForecastKpis(){
  const peak=DAILY.reduce((b,d)=>!b||d.v>b.v?d:b,null);
  const activeProducts=FORECAST.active_products!=null?FORECAST.active_products:PRODUCTS.length;
  const avgStd=HAS_STD&&PRODUCTS.length?PRODUCTS.reduce((a,p)=>a+pStd(p),0)/PRODUCTS.length:0;
  document.getElementById('fcKpis').innerHTML=
    kc('g','סה"כ '+unitLbl()+' לשבוע',fmt(TOTAL),'תחזית מצרפית')+
    kc('t','מוצרים פעילים',fmt(activeProducts),'בתחזית השבוע')+
    kc('a','יום השיא',PEAK_DAY,peak&&peak.v>0?(fmt(peak.v)+' '+unitLbl()+' · '+pct(peak.v,TOTAL)):'')+
    (HAS_STD
      ? kc('n','סטיית תקן ממוצעת','±'+fmt1(avgStd),'תנודתיות שבועית למוצר ('+unitLbl()+')')
      : kc('p','חג קרוב',NEXT_HOL||'אין',NEXT_HOL?holText(FORECAST.next_holiday):'בשבוע הקרוב', NEXT_HOL?'a':''));
}

function buildDailyChart(){
  makeChart('dailyChart',{type:'bar',data:{labels:DAYS,datasets:[{label:unitLbl(),data:DAILY.map(d=>d.v),backgroundColor:DAYS_COLORS.map(c=>c+'CC'),borderColor:DAYS_COLORS,borderWidth:2,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip,callbacks:{label:c=>' '+fmt1(c.raw)+' '+unitLbl()+' ('+pct(c.raw,TOTAL)+')'}}},
      scales:{x:{grid:{display:false},ticks:tickOpts},y:{grid:gridOpts,ticks:{...tickOpts,callback:v=>fmt(v)}}}}});
  const badge=document.getElementById('dailyBadge'); if(badge) badge.textContent=unitLbl();
  const peak=DAILY.reduce((b,d)=>!b||d.v>b.v?d:b,null);
  const e=document.getElementById('dailyIns');
  if(e&&peak) e.textContent='🔵 יום השיא הצפוי: '+peak.day+' ('+fmt(peak.v)+' '+unitLbl()+'). סה"כ שבועי צפוי: '+fmt(TOTAL)+' '+unitLbl()+'.';
}

function buildTopProductsChart(){
  const top=PRODUCTS.slice(0,18);
  const vals=top.map(p=>pVal(p)), errs=top.map(p=>pStd(p));
  // קווי סטיית תקן אופקיים (רק במצב מחושב)
  const errPlugin={id:'fcTopErr',afterDatasetsDraw(chart){
    if(!HAS_STD) return;
    const x=chart.scales.x, ctx=chart.ctx, meta=chart.getDatasetMeta(0);
    ctx.save(); ctx.strokeStyle='#334155'; ctx.lineWidth=1.5;
    meta.data.forEach((bar,i)=>{ const e=errs[i]; if(!e) return;
      const cy=bar.y, right=x.getPixelForValue(vals[i]+e), left=x.getPixelForValue(Math.max(0,vals[i]-e));
      ctx.beginPath(); ctx.moveTo(left,cy); ctx.lineTo(right,cy);
      ctx.moveTo(right,cy-4); ctx.lineTo(right,cy+4); ctx.moveTo(left,cy-4); ctx.lineTo(left,cy+4); ctx.stroke(); });
    ctx.restore(); }};
  makeChart('topChart',{type:'bar',data:{labels:top.map(p=>p.name.length>22?p.name.slice(0,22)+'…':p.name),
    datasets:[{label:unitLbl(),data:vals,backgroundColor:'rgba(13,148,136,0.75)',borderColor:'#0d9488',borderWidth:2,borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip,callbacks:{label:c=>' '+fmt1(c.raw)+' '+unitLbl()+(HAS_STD?(' · סטיית תקן ±'+fmt1(errs[c.dataIndex])):'')}}},
      scales:{x:{grid:gridOpts,ticks:{...tickOpts,callback:v=>fmt(v)}},y:{grid:{display:false},ticks:{...tickOpts,font:{size:10}}}}},
    plugins:[errPlugin]});
  const badge=document.getElementById('topBadge'); if(badge) badge.textContent=unitLbl()+' לשבוע';
}

function buildProductsTable(){
  const maxV=PRODUCTS.length?pVal(PRODUCTS[0]):0;
  const stdTh=HAS_STD?'<th>סטיית תקן</th>':'';
  let html='<thead><tr><th>#</th><th>מוצר</th><th>'+unitLbl()+' לשבוע</th>'+stdTh+'<th>% מהסה"כ</th>'+DAYS.map(d=>'<th>'+d+'</th>').join('')+'</tr></thead><tbody>';
  PRODUCTS.forEach((p,i)=>{
    const v=pVal(p), dd=pDaily(p);
    const barW=maxV?Math.round(v/maxV*100):0;
    const stdTd=HAS_STD?'<td>±'+fmt1(pStd(p))+'</td>':'';
    html+='<tr data-name="'+p.name.replace(/"/g,'&quot;')+'"><td>'+(i+1)+'</td>'+
      '<td title="'+p.name.replace(/"/g,'&quot;')+'">'+(p.name.length>28?p.name.slice(0,28)+'…':p.name)+'</td>'+
      '<td>'+fmt1(v)+'</td>'+stdTd+
      '<td>'+pct(v,TOTAL)+'<div class="prod-bar-wrap"><div class="prod-bar" style="width:'+barW+'%"></div></div></td>'+
      DAYS.map(d=>'<td>'+(dd[d]>0?fmt1(dd[d]):'<span style="color:#cbd5e1">—</span>')+'</td>').join('')+
      '</tr>';
  });
  const totRow=DAYS.map(d=>PRODUCTS.reduce((a,p)=>a+pDaily(p)[d],0));
  html+='<tr class="total"><td></td><td>סה"כ</td><td>'+fmt1(PRODUCTS.reduce((a,p)=>a+pVal(p),0))+'</td>'+(HAS_STD?'<td></td>':'')+'<td></td>'+totRow.map(v=>'<td>'+fmt1(v)+'</td>').join('')+'</tr></tbody>';
  document.getElementById('prodTable').innerHTML=html;
}

function filterProducts(){
  const q=(document.getElementById('prodSearch').value||'').trim();
  document.querySelectorAll('#prodTable tbody tr').forEach(tr=>{
    if(tr.classList.contains('total')){ tr.style.display=q?'none':''; return; }
    const n=tr.getAttribute('data-name')||'';
    tr.style.display=(!q||n.indexOf(q)>=0)?'':'none';
  });
}

// מצב ריק — אין עדיין תחזית בלשונית FORECAST
function renderForecastEmpty(){
  document.getElementById('hdrSub').textContent='התחזית תתעדכן ביום חמישי';
  document.getElementById('hdrKpis').innerHTML='';
  document.getElementById('fcKpis').innerHTML='';
  document.getElementById('fcBody').style.display='none';
  document.getElementById('fcEmpty').innerHTML=
    '<div class="card"><div class="card-title">תחזית השבוע הקרוב <span class="card-badge a">ממתין</span></div>'+
    '<div class="empty-note">התחזית לשבוע הקרוב תופיע כאן ביום חמישי, אחרי הפקת החיזוי.</div></div>';
}

// ═══════════════════════════════ בדיקת החיזוי (ACCURACY) ═══════════════════════════════
function renderAccuracy(){
  const host=document.getElementById('accSection');
  const a=ACCURACY;
  if(!a || (!a.wape && !a.forecast_total && !(a.products&&a.products.length))){
    host.innerHTML='<div class="card"><div class="card-title">בדיקת החיזוי — דוח ההצלחה <span class="card-badge a">ממתין</span></div>'+
      '<div class="empty-note">דוח ההצלחה יופיע ביום ראשון, אחרי העלאת הנתונים בפועל.</div></div>';
    return;
  }
  const ft=num(a.forecast_total), at=num(a.actual_total);
  const wape=a.wape!=null?num(a.wape):(at?Math.abs(ft-at)/at*100:0);
  const diff=at?((ft-at)/at*100):0;
  const wk=a.week?(' — '+a.week):'';

  let html='<div class="card"><div class="card-title">בדיקת החיזוי — דוח ההצלחה'+wk+' <span class="card-badge g">חיזוי מול פועל</span></div>';
  html+='<div class="kpi-grid">'+
    kc('a','שגיאה שבועית מצרפית (WAPE)',fmt1(wape)+'%',wape<=12?'דיוק טוב':'לשיפור', wape<=12?'g':'r')+
    kc('t','חיזוי',fmt(ft)+' ק"ג','השבוע שעבר')+
    kc('g','בפועל',fmt(at)+' ק"ג','השבוע שעבר')+
    kc('n','פער',(diff>=0?'+':'')+fmt1(diff)+'%',diff>=0?'חיזוי גבוה מהפועל':'חיזוי נמוך מהפועל', diff>=0?'a':'r')+
    '</div>';

  // השוואת חיזוי מול פועל — המוצרים המובילים
  const prods=(a.products||[]).map(p=>({name:String(p.name||p.id||'—'),f:num(p.forecast),act:num(p.actual)}))
    .sort((x,y)=>Math.max(y.f,y.act)-Math.max(x.f,x.act)).slice(0,15);
  if(prods.length){
    html+='<div class="card-title" style="border:none;margin-top:6px">השוואת חיזוי מול פועל — מוצרים מובילים</div>'+
      '<div class="cw t"><canvas id="accChart"></canvas></div>';
  }

  // מוצרים שתמיד מעל / מתחת לחיזוי
  const over=a.always_over||[], under=a.always_under||[];
  if(over.length||under.length){
    html+='<div class="grid2" style="margin-top:14px">'+
      '<div><div class="card-title" style="border:none">מוצרים שתמיד מעל החיזוי <span class="card-badge a">חיזוי נמוך מדי</span></div>'+
        (over.length?'<div class="tags">'+over.map(n=>'<span class="tag up">'+String(n)+'</span>').join('')+'</div>':'<div class="kpi-sub">אין</div>')+'</div>'+
      '<div><div class="card-title" style="border:none">מוצרים שתמיד מתחת לחיזוי <span class="card-badge g">חיזוי גבוה מדי</span></div>'+
        (under.length?'<div class="tags">'+under.map(n=>'<span class="tag dn">'+String(n)+'</span>').join('')+'</div>':'<div class="kpi-sub">אין</div>')+'</div>'+
      '</div>';
  }
  html+='</div>';
  host.innerHTML=html;

  if(prods.length){
    makeChart('accChart',{type:'bar',data:{labels:prods.map(p=>p.name.length>16?p.name.slice(0,16)+'…':p.name),
      datasets:[
        {label:'חיזוי',data:prods.map(p=>p.f),backgroundColor:'rgba(37,99,168,0.75)',borderColor:'#2563a8',borderWidth:1.5,borderRadius:4},
        {label:'בפועל',data:prods.map(p=>p.act),backgroundColor:'rgba(22,163,74,0.75)',borderColor:'#16a34a',borderWidth:1.5,borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}},tooltip:{...ttip,callbacks:{label:c=>' '+c.dataset.label+': '+fmt1(c.raw)+' ק"ג'}}},
        scales:{x:{grid:{display:false},ticks:{...tickOpts,font:{size:10}}},y:{grid:gridOpts,ticks:{...tickOpts,callback:v=>fmt(v)}}}}});
  }
}
</script>
